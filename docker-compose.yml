services:
  instagram-mcp:
    build: .
    container_name: instagram-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Persist config (proxy/headless/server.host/port) and any future state.
    volumes:
      - ./data/instagram-mcp:/root/.instagram-mcp
      - ./user_data:/root/.openclaw/workspace/instagram-mcp/user_data
    environment:
      # Keep timezone consistent for logs (optional)
      - TZ=Asia/Shanghai
    # 允许访问宿主机网络（用于代理）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

